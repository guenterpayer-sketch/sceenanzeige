    # -------------------------------------------------------------------------
    # AffiliateLink
    # -------------------------------------------------------------------------

    AffiliateLink_CreateCampaignLead:
      type: object
      required: [campaignHash, firstname, lastname, email]
      properties:
        campaignHash: { type: string }
        firstname:    { type: string }
        lastname:     { type: string }
        email:        { type: string, format: email }
        customerHash:
          type: string
          nullable: true

    AffiliateLink_PublicCampaign:
      type: object
      required: [id, name, theme, themePath, content, thankYouText, company]
      properties:
        id:           { type: integer }
        name:         { type: string }
        theme:        { type: string }
        themePath:    { type: string }
        content:      { type: string }
        thankYouText: { type: string }
        customerHash:
          type: string
          nullable: true
        company:
          $ref: '#/components/schemas/ZZLegacyCashBox_PublicCompany'

    ZZLegacyCashBox_PublicCompany:
      type: object
      required: [id, name]
      properties:
        id:    { type: integer }
        name:  { type: string }
        imprintUrl:           { type: string, nullable: true, format: uri }
        privacyPolicyUrl:     { type: string, nullable: true, format: uri }
        termsUrl:             { type: string, nullable: true, format: uri }
        cancellationRightsUrl: { type: string, nullable: true, format: uri }
        logoSquare:           { type: string, nullable: true }
        logoWide:             { type: string, nullable: true }

    # -------------------------------------------------------------------------
    # Community
    # -------------------------------------------------------------------------

    Community_FeedPost:
      type: object
      required:
        - id
        - commentsDisabled
        - content
        - isAdvertisement
        - isPinned
        - creationDate
        - ownerIsOfficial
        - isViewed
        - isLoveMe
        - othersLove
        - friendsLove
        - remainingLove
        - comments
      properties:
        id:                { type: integer }
        commentsDisabled:  { type: boolean }
        content:
          $ref: '#/components/schemas/Community_PostContent'
        isAdvertisement:   { type: boolean }
        isPinned:          { type: boolean }
        owner:
          allOf:
            - $ref: '#/components/schemas/ZZLegacyCustomer_SimpleCustomer'
          nullable: true
        creationDate:
          type: integer
          description: Unix timestamp (seconds).
        communityShowFriendsOnlineStatus: { type: boolean, nullable: true }
        communityStatusText:              { type: string,  nullable: true }
        origin:                           { type: string,  nullable: true }
        originLink:                       { type: string,  nullable: true }
        ownerName:                        { type: string,  nullable: true }
        ownerIsOfficial:                  { type: boolean }
        isViewed:                         { type: boolean }
        isLoveMe:                         { type: boolean }
        othersLove:                       { type: integer }
        friendsLove:
          type: array
          items:
            $ref: '#/components/schemas/Community_FriendLove'
        remainingLove: { type: integer }
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Community_FeedComment'

    Community_PostContent:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [text, image, video, url, poll]
        content:     { type: string }
        description: { type: string, nullable: true }
        title:       { type: string, nullable: true }
        url:         { type: string, nullable: true, format: uri }
        videoId:     { type: string, nullable: true }
        videoType:
          type: string
          nullable: true
          enum: [vimeo, youtube]
        addOwn:      { type: boolean, nullable: true }
        answers:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Community_PollAnswer'
        multiple:    { type: boolean, nullable: true }
        question:    { type: string,  nullable: true }
        image:       { type: string,  nullable: true }
        images:
          type: array
          nullable: true
          items: { type: string }

    Community_PollAnswer:
      type: object
      required: [fromUser, id, label, totalAnswers, votesCount, votesPercent]
      properties:
        fromUser:           { type: boolean }
        id:                 { type: integer }
        label:              { type: string }
        post:               { type: string, nullable: true }
        selectedTimestamp:  { type: integer, nullable: true }
        totalAnswers:       { type: integer }
        votesCount:         { type: integer }
        votesPercent:       { type: number }

    Community_FriendLove:
      type: object
      required: [customerNr, fullName, gender, showOnlineStatus]
      properties:
        customerNr:       { type: integer }
        fullName:         { type: string }
        gender:
          $ref: '#/components/schemas/Gender'
        showOnlineStatus: { type: boolean }

    Community_FeedComment:
      type: object
      required: [id, content, timestamp]
      properties:
        id:        { type: integer }
        owner:
          allOf:
            - $ref: '#/components/schemas/ZZLegacyCustomer_SimpleCustomer'
          nullable: true
        content:   { type: string }
        timestamp:
          type: integer
          description: Unix timestamp (seconds).
        showOnlineStatus: { type: boolean, nullable: true }

    # -------------------------------------------------------------------------
    # Customer (referenced by Community and Tasks)
    # -------------------------------------------------------------------------

    ZZLegacyCustomer_SimpleCustomer:
      type: object
      required: [customerNumber, cardId, fullName, person, tags, profileImageUrl]
      properties:
        customerNumber: { type: integer }
        cardId:         { type: string }
        fullName:       { type: string }
        person:
          $ref: '#/components/schemas/System_Person_APerson'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/ZZLegacyCustomer_CustomerTag'
        phoneNumbers:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/System_Person_PersonContactItem'
        profileImageUrl: { type: string, format: uri }
        birthday:
          allOf:
            - $ref: '#/components/schemas/DayDate'
          nullable: true

    ZZLegacyCustomer_CustomerTag:
      type: object
      required: [id, shortName, longName, color, useForPrimaryColor]
      properties:
        id:                  { type: integer }
        shortName:           { type: string }
        longName:            { type: string }
        color:               { type: string }
        useForPrimaryColor:  { type: boolean }

    System_Person_APerson:
      type: object
      description: Base "person" type. `personType` discriminates between natural and company persons.
      required: [personType]
      properties:
        id: { type: integer, nullable: true }
        personType:
          type: string
          enum: [natural, company]
        fullName:        { type: string, nullable: true }
        reverseFullName: { type: string, nullable: true }
      discriminator:
        propertyName: personType
        mapping:
          natural: '#/components/schemas/System_Person_NaturalPerson'
          company: '#/components/schemas/System_Person_CompanyPerson'

    System_Person_NaturalPerson:
      allOf:
        - $ref: '#/components/schemas/System_Person_APerson'
        - type: object
          required: [firstName, lastName, gender, salutation, isFormalSalutation]
          properties:
            firstName:          { type: string }
            lastName:           { type: string }
            gender:             { $ref: '#/components/schemas/Gender' }
            salutation:         { $ref: '#/components/schemas/Salutation' }
            isFormalSalutation: { type: boolean }

    System_Person_CompanyPerson:
      allOf:
        - $ref: '#/components/schemas/System_Person_APerson'
        - type: object
          required: [legalForm, companyName]
          properties:
            legalForm:   { type: string }
            companyName: { type: string }

    System_Person_PersonContactItem:
      type: object
      required: [type, value]
      properties:
        id:        { type: integer, nullable: true }
        type:      { $ref: '#/components/schemas/PersonContactItemType' }
        value:     { type: string }
        itemRole:
          allOf:
            - $ref: '#/components/schemas/PersonContactItemRole'
          nullable: true
        notes:     { type: string,  nullable: true }
        noMassText: { type: boolean, nullable: true }
        isHistory: { type: boolean, nullable: true }
        isPrimary: { type: boolean, nullable: true }

    # -------------------------------------------------------------------------
    # System / Direct DB access
    # -------------------------------------------------------------------------

    System_DirectDbAccessQuery:
      type: object
      required: [sql, params, arrayTypes]
      properties:
        sql:
          type: string
          description: The SQL query (read-only).
        params:
          type: object
          additionalProperties: true
          description: Dictionary of named query parameters.
        arrayTypes:
          type: object
          additionalProperties: { type: string }
          description: Types of array parameters (parameter name → type identifier).

    # -------------------------------------------------------------------------
    # Tasks
    # -------------------------------------------------------------------------

    Task_TaskListCategory:
      type: object
      required: [name]
      properties:
        id:        { type: integer, nullable: true }
        name:      { type: string }
        listCount: { type: integer, nullable: true }

    Task_TaskStage:
      type: object
      required: [name, color, timeLimit, completeLimit]
      properties:
        id:            { type: integer, nullable: true }
        name:          { type: string }
        color:         { type: string }
        timeLimit:     { type: integer }
        completeLimit: { type: integer }

    Task_TaskListStage:
      type: object
      required: [stage, orderNumber]
      properties:
        stage:
          $ref: '#/components/schemas/Task_TaskStage'
        orderNumber:   { type: integer }
        numberOfTasks: { type: integer, nullable: true }

    Task_TaskList:
      type: object
      required: [name, owner, category, view, isTemplate, isDefault, stages]
      properties:
        id:    { type: integer, nullable: true }
        name:  { type: string }
        owner:
          $ref: '#/components/schemas/User_SimpleUser'
        category:
          $ref: '#/components/schemas/Task_TaskListCategory'
        view:
          $ref: '#/components/schemas/TaskListView'
        numberOfOverdueTasks: { type: integer, nullable: true }
        isTemplate: { type: boolean }
        isDefault:  { type: boolean }
        userPermission:
          allOf:
            - $ref: '#/components/schemas/UserPermissionLevel'
          nullable: true
        stages:
          type: array
          items:
            $ref: '#/components/schemas/Task_TaskListStage'

    Task_TaskCategory:
      type: object
      required: [name, color]
      properties:
        id:    { type: integer, nullable: true }
        name:  { type: string }
        color: { type: string }

    Task_SubTask:
      type: object
      required: [title, details, isCompleted, orderNumber]
      properties:
        id:          { type: integer, nullable: true }
        title:       { type: string }
        details:     { type: string }
        isCompleted: { type: boolean }
        orderNumber: { type: integer }

    Task_APITask:
      type: object
      required:
        - title
        - description
        - priority
        - customers
        - users
        - groups
        - articles
        - subtasks
      properties:
        id:          { type: integer, nullable: true }
        title:       { type: string }
        description: { type: string }
        category:
          allOf:
            - $ref: '#/components/schemas/Task_TaskCategory'
          nullable: true
        priority:
          $ref: '#/components/schemas/TaskPriority'
        completionDate:
          allOf:
            - $ref: '#/components/schemas/AtomDate'
          nullable: true
        completionStartTime:
          allOf:
            - $ref: '#/components/schemas/AtomDate'
          nullable: true
        completionEndTime:
          allOf:
            - $ref: '#/components/schemas/AtomDate'
          nullable: true
        customers:
          type: array
          items:
            $ref: '#/components/schemas/ZZLegacyCustomer_SimpleCustomer'
        users:
          type: array
          items:
            $ref: '#/components/schemas/User_SimpleUser'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/User_APIUserGroup'
        articles:
          type: array
          items: { type: integer }
        originalItem: { type: integer, nullable: true }
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Task_SubTask'

    # -------------------------------------------------------------------------
    # Users
    # -------------------------------------------------------------------------

    User_SimpleUser:
      type: object
      required: [username, firstName, lastName, isDeleted]
      properties:
        id:        { type: integer, nullable: true }
        username:  { type: string }
        firstName: { type: string }
        lastName:  { type: string }
        profileImageUrl:      { type: string, nullable: true, format: uri }
        profileImageSmallUrl: { type: string, nullable: true, format: uri }
        isDeleted: { type: boolean }
        status:
          allOf:
            - $ref: '#/components/schemas/UserOnlineStatus'
          nullable: true

    User_APIUser:
      type: object
      required: [username, firstName, lastName, roleId, roleName]
      properties:
        id:        { type: integer, nullable: true }
        username:  { type: string }
        firstName: { type: string }
        lastName:  { type: string }
        roleId:    { type: integer }
        roleName:  { type: string }
        profileImageUrl:      { type: string, nullable: true, format: uri }
        profileImageSmallUrl: { type: string, nullable: true, format: uri }
        email:       { type: string, nullable: true, format: email }
        phoneNumber: { type: string, nullable: true }
        lastLogin:
          allOf:
            - $ref: '#/components/schemas/AtomDate'
          nullable: true

    User_APIUserGroup:
      type: object
      required: [name, members]
      properties:
        id:   { type: integer, nullable: true }
        name: { type: string }
        members:
          type: array
          items:
            $ref: '#/components/schemas/User_APIUser'

    User_APIRole:
      type: object
      required: [name, permissions]
      properties:
        id:   { type: integer, nullable: true }
        name: { type: string }
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionName'
        users:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/User_APIUser'

    User_SSORequest:
      type: object
      required: [applicationName, forwardUrl, cancelUrl]
      properties:
        applicationName:
          type: string
          description: Name of your application. May not contain the word "Nimbuscloud".
        forwardUrl:
          type: string
          format: uri
          description: |
            URL the user is redirected to after a successful login. Must start with `https://`
            and contain the placeholder `{token}` which will be replaced with the user token.
        cancelUrl:
          type: string
          format: uri
          description: |
            URL the user is redirected to if the login is cancelled. Must start with `https://`.
