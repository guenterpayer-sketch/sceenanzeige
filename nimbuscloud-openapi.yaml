openapi: 3.0.3
info:
  title: Nimbuscloud API
  version: "2.0"
  description: |
    REST API for the Nimbuscloud platform.

    ## Authentication
    The API key must be provided in the `X-API-Key` header on every request.

    ## Permission requirements
    Every endpoint documents one of three permission requirement levels:
      - **Single** — the single shown permission is required.
      - **All** — every shown permission is required.
      - **Any** — at least one of the shown permissions is required.

    Access that is rejected because of missing permissions or an IP address mismatch is recorded in the system log.

    ## Envelope conventions
    All JSON requests and responses wrap their payload in a top-level `data` property. Binary requests and responses are exempt.

    Dates are exchanged in PHP `DATE_ATOM` format (ISO 8601 with timezone), e.g. `2005-08-15T15:52:01+00:00`.

    ## Pagination
    Paginated responses use:
      - `items` — the page of records (inside `data`)
      - `totalItemCount` — total number of records matching the query
      - `pageStart` — offset of the first returned record (defaults to `0`)
      - `pageSize` — number of records per page (defaults to `10`, max `1000`)

    The corresponding request query parameters `pageStart` and `pageSize` follow the same defaults and limits.

servers:
  - url: https://demo.nimbuscloud.at/backend
    description: Nimbuscloud demo base URL

security:
  - ApiKeyAuth: []

tags:
  - name: AffiliateLink
    description: Affiliate-link campaigns and leads (public endpoints).
  - name: Community
    description: Community newsfeed.
  - name: System
    description: System utilities (direct DB access).
  - name: Task
    description: Tasks, task lists, list categories and stages.
  - name: User
    description: Users, user groups, roles and SSO.

paths:

  /v1/affiliate-link/campaign-leads/create:
    post:
      tags: [AffiliateLink]
      summary: Create a campaign lead
      description: |
        **Permission requirement (Single):** `System_Public`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: '#/components/schemas/AffiliateLink_CreateCampaignLead'
      responses:
        '200':
          description: Lead created successfully.
        '404':
          description: Not found.

  /v1/affiliate-link/campaign-leads/{campaignHash}/{leadHash}/confirm:
    get:
      tags: [AffiliateLink]
      summary: Confirm a campaign lead (double opt-in)
      description: |
        **Permission requirement (Single):** `System_Public`
      parameters:
        - in: path
          name: campaignHash
          required: true
          schema: { type: string }
        - in: path
          name: leadHash
          required: true
          schema: { type: string }
        - in: query
          name: customerHash
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Lead confirmed.
        '404':
          description: Not found.

  /v1/affiliate-link/campaigns/{urlHash}/public:
    get:
      tags: [AffiliateLink]
      summary: Get the public view of a campaign
      description: |
        **Permission requirement (Single):** `System_Public`
      parameters:
        - in: path
          name: urlHash
          required: true
          schema: { type: string }
        - in: query
          name: customerHash
          required: false
          schema: { type: string }
      responses:
        '200':
          description: The public campaign.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/AffiliateLink_PublicCampaign'
        '400':
          description: Bad request.
        '404':
          description: Campaign not found.

  /v2/community/api-feed/api-posts:
    get:
      tags: [Community]
      summary: Get paginated community feed posts
      description: |
        Returns the paginated posts of a community newsfeed from the viewpoint of a selected customer.

        **Permission requirement (Single):** `Community_ApiKey_Community`
      parameters:
        - in: query
          name: customer
          required: true
          description: Customer number whose viewpoint is used.
          schema: { type: integer }
        - in: query
          name: id
          required: true
          description: ID of a group or event; `0` for the main feed.
          schema: { type: integer }
        - in: query
          name: type
          required: true
          schema:
            type: string
            enum: [main, event, group]
        - $ref: '#/components/parameters/PageStart'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: The paginated posts.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/PaginatedEnvelope'
                      - type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Community_FeedPost'
        '400':
          description: The selected customer is not allowed to view this feed.
        '404':
          description: The selected customer was not found.

  /v2/system/direct-db-access/execute-query:
    post:
      tags: [System]
      summary: Execute a read-only SQL query against the instance database
      description: |
        Provides SQL read-only access to the instance database. Access must be enabled by the
        support team and is only granted on special request with detailed information on what is needed.

        **Permission requirement (Single):** `System_ApiKey_DirectDatabaseAccess`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: '#/components/schemas/System_DirectDbAccessQuery'
      responses:
        '200':
          description: Query succeeded. `data` is the row set returned by the query.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: {}
                    description: Rows returned by the query (each row is an arbitrary JSON object).
        '400':
          description: Query failed. The response body is the SQL error message.

  /v2/system/direct-db-access/schema:
    get:
      tags: [System]
      summary: Get the database schema
      description: |
        Retrieves the current database schema as an array of `CREATE TABLE` and `ALTER TABLE` SQL statements.

        **Permission requirement (Single):** `System_ApiKey_DirectDatabaseAccess`
      responses:
        '200':
          description: The schema statements.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { type: string }

  /v2/task/list-categories:
    get:
      tags: [Task]
      summary: Get all task list categories
      description: |
        **Permission requirement (Single):** `Task_ApiKey_All`
      responses:
        '200':
          description: The currently available task list categories.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task_TaskListCategory'

  /v2/task/lists/all:
    get:
      tags: [Task]
      summary: Get all task lists for a given user
      description: |
        **Permission requirement (Single):** `Task_ApiKey_All`
      parameters:
        - in: query
          name: user
          required: true
          schema: { type: integer }
        - in: query
          name: categoryId
          required: false
          schema: { type: integer }
        - in: query
          name: stageId
          required: false
          schema: { type: integer }
      responses:
        '200':
          description: The currently available task lists.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task_TaskList'
        '404':
          description: The given user was not found.

  /v2/task/stages:
    get:
      tags: [Task]
      summary: Get all task stages
      description: |
        **Permission requirement (Single):** `Task_ApiKey_All`
      responses:
        '200':
          description: The currently available task list stages.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task_TaskStage'

  /v2/task/tasks/overdue:
    get:
      tags: [Task]
      summary: Get all overdue tasks of a given user
      description: |
        **Permission requirement (Single):** `Task_ApiKey_All`
      parameters:
        - in: query
          name: user
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: The overdue tasks.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task_APITask'
        '404':
          description: The given user was not found.

  /v2/task/tasks/{customerNr}/customer:
    get:
      tags: [Task]
      summary: Get all tasks of a given customer
      description: |
        **Permission requirement (Single):** `Task_ApiKey_All`
      parameters:
        - in: path
          name: customerNr
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: The tasks.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task_APITask'
        '404':
          description: The given customer was not found.

  /v2/task/tasks/{id}/complete:
    post:
      tags: [Task]
      summary: Mark a task as completed or not completed
      description: |
        **Permission requirement (Single):** `Task_ApiKey_All`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: isCompleted
          required: true
          schema: { type: boolean }
      responses:
        '200':
          description: Task updated.
        '400':
          description: The task is already marked as completed.
        '403':
          description: Insufficient permission.
        '404':
          description: The given task was not found.

  /v2/task/tasks/{listId}/list:
    get:
      tags: [Task]
      summary: Get tasks from a given task list
      description: |
        **Permission requirement (Single):** `Task_ApiKey_All`
      parameters:
        - in: path
          name: listId
          required: true
          schema: { type: integer }
        - in: query
          name: includeCompleted
          required: false
          schema: { type: boolean }
      responses:
        '200':
          description: The tasks in the given list.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task_APITask'
        '404':
          description: The given task list was not found.

  /v2/user/auth/sso/create-login-token:
    post:
      tags: [User]
      summary: Create an SSO login URL for the nimbuscloud
      description: |
        Returns a URL that the end user must open to log in. After login the user is redirected
        to your `forwardUrl` with the placeholder `{token}` replaced by a unique user token, which can be
        exchanged for user information via `/v2/user/auth/sso/user-by-user-token`.

        **Permission requirement (Single):** `User_ApiKey_Authenticate`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: '#/components/schemas/User_SSORequest'
      responses:
        '200':
          description: The URL to forward the user to.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: string, format: uri }
        '403':
          description: The provided URLs do not match the required format.

  /v2/user/auth/sso/dashboard-iframe-token-info:
    get:
      tags: [User]
      summary: Get information about the user that opened the nimbuscloud dashboard
      description: |
        **Permission requirement (Single):** `User_ApiKey_Authenticate`
      parameters:
        - in: query
          name: token
          required: true
          description: Token provided by the nimbuscloud dashboard in your iframe URL.
          schema: { type: string }
      responses:
        '200':
          description: The authenticated user.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User_APIUser'
        '404':
          description: The supplied token has expired or is invalid.

  /v2/user/auth/sso/user-by-user-token:
    get:
      tags: [User]
      summary: Resolve a user token returned by the SSO redirect
      description: |
        **Permission requirement (Single):** `User_ApiKey_Authenticate`
      parameters:
        - in: query
          name: token
          required: true
          description: User token provided by the redirected user.
          schema: { type: string }
      responses:
        '200':
          description: The authenticated user.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User_APIUser'
        '404':
          description: The supplied user token has expired or was already used.

  /v2/user/groups:
    get:
      tags: [User]
      summary: Get all user groups with their members
      description: |
        **Permission requirement (Single):** `User_ApiKey_Read`
      responses:
        '200':
          description: The currently available groups.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User_APIUserGroup'

  /v2/user/roles:
    get:
      tags: [User]
      summary: Get all user roles with members and permissions
      description: |
        **Permission requirement (Single):** `User_ApiKey_Read`
      responses:
        '200':
          description: The currently available roles.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User_APIRole'

  /v2/user/users:
    get:
      tags: [User]
      summary: Get all users
      description: |
        **Permission requirement (Single):** `User_ApiKey_Read`
      responses:
        '200':
          description: The currently available users.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User_APIUser'

components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key used to authenticate the caller. The required permission(s) for each endpoint
        are documented in that endpoint's description. Access rejected because of missing
        permissions or an IP address mismatch is recorded in the system log.

  parameters:
    PageStart:
      in: query
      name: pageStart
      required: false
      description: Pagination offset (e.g. `0`, `10`, `20`, ...). Defaults to `0`.
      schema:
        type: integer
        minimum: 0
        default: 0
    PageSize:
      in: query
      name: pageSize
      required: false
      description: Number of items per page. Defaults to `10`, maximum `1000`.
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 10

  schemas:

    # -------------------------------------------------------------------------
    # Generic envelopes
    # -------------------------------------------------------------------------

    PaginatedEnvelope:
      type: object
      description: |
        Common paginated response shape. The actual `items` array type is documented per endpoint.
      required: [items, totalItemCount, pageStart, pageSize]
      properties:
        items:
          type: array
          description: The page of records.
          items: {}
        totalItemCount:
          type: integer
          description: Total number of records matching the query (across all pages).
        pageStart:
          type: integer
          description: Offset of the first returned record.
        pageSize:
          type: integer
          description: Number of records in this page.

    AtomDate:
      type: string
      format: date-time
      description: |
        Date/time in PHP `DATE_ATOM` format (ISO 8601 with timezone), e.g. `2005-08-15T15:52:01+00:00`.
      example: '2005-08-15T15:52:01+00:00'

    DayDate:
      type: string
      format: date
      description: A calendar day with no time component (`YYYY-MM-DD`).
      example: '2024-03-14'

    # -------------------------------------------------------------------------
    # Enumerations
    # -------------------------------------------------------------------------

    Gender:
      type: string
      enum: [male, female, nonBinary]

    Salutation:
      type: string
      enum: [mr, mrs, neutral]

    UserOnlineStatus:
      type: string
      enum: [online, offline, doNotDisturb, away, blocked, inCall]

    PersonContactItemType:
      type: string
      enum:
        - email
        - mobile
        - phone
        - website
        - skype
        - facebook
        - instagram
        - twitter
        - tiktok
        - snapchat
        - telegram
        - livechat

    PersonContactItemRole:
      type: string
      enum: [contact, business, private]

    TaskPriority:
      type: string
      enum: [low, mid, high]

    TaskListView:
      type: string
      enum: [stages, list, tiles]

    UserPermissionLevel:
      type: integer
      description: Permission level on a shared item (0 = none, 4 = full).
      enum: [0, 1, 2, 3, 4]

    PermissionName:
      type: string
      description: One of the available permission identifiers used by API keys, roles and the system.
      enum:
        - AffiliateLink
        - Community_Chat
        - Community_Content
        - Community_ApiKey_Community
        - ExternalCommunication_Mail
        - ExternalCommunication_PhoneCallLog
        - ExternalCommunication_Settings
        - ExternalCommunication_SendAndViewUnifiedMessages
        - FileManagement
